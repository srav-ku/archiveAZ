name: Video Processor and Archiver Pipeline

on:
  schedule:
    - cron: '0 */6 * * *' # Automated execution loop running every 6 hours
  workflow_dispatch:     # Enables manual triggering from the GitHub UI

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Free Disk Space for Media Processing
        run: |
          echo "==== Pre-cleanup Disk Status ===="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          echo "==== Post-cleanup Disk Status ===="
          df -h

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies (FFmpeg & FFprobe)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Package Dependencies
        run: |
          python -msip install --upgrade pip
          pip install -r requirements.txt

      - name: Install and Initialize Playwright Webkit Drivers
        run: |
          pip install playwright
          playwright install chromium

      - name: Execute Main Core Pipeline
        env:
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          python main.py
